<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlogSpace</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1 class="logo">Blog<span>Space</span></h1>

      <div id="loginForm" class="form-section active">
        <h2>Login</h2>
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" required>
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" required>
          </div>
          <button type="submit" class="btn btn-block">Login</button>
        </form>
        <p class="toggle-text">No account? <a href="#" onclick="toggleForm(event)">Sign up</a></p>
        <div id="loginMessage" class="message"></div>
      </div>

      <div id="signupForm" class="form-section">
        <h2>Create Account</h2>
        <form onsubmit="handleSignup(event)">
          <div class="form-group">
            <label for="signupName">Name</label>
            <input type="text" id="signupName" required>
          </div>
          <div class="form-group">
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" required>
          </div>
          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input type="password" id="signupPassword" required>
          </div>
          <button type="submit" class="btn btn-block">Sign Up</button>
        </form>
        <p class="toggle-text">Have an account? <a href="#" onclick="toggleForm(event)">Login</a></p>
        <div id="signupMessage" class="message"></div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
